<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conjunction Alert Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
</head>
<body>
  <header class="app-header">
    <h1>Conjunction Alert Simulator</h1>
    <p class="subtitle">衛星 TLE から7日間のデブリ接近を検出・可視化（Phase 3: CDM / コンステレーション）</p>
  </header>

  <nav class="mode-tabs" role="tablist">
    <button id="tab-single" type="button" class="tab active" data-mode="single" role="tab">単一衛星</button>
    <button id="tab-constellation" type="button" class="tab" data-mode="constellation" role="tab">コンステレーション</button>
    <button id="tab-cdm" type="button" class="tab" data-mode="cdm" role="tab">CDM 比較</button>
    <button id="tab-alerts" type="button" class="tab" data-mode="alerts" role="tab">CDM アラート</button>
  </nav>

  <main class="layout">
    <aside class="panel sidebar">
      <section id="panel-single" class="mode-panel">
        <h2>衛星 TLE</h2>
        <textarea id="tle-input" rows="6" placeholder="3行 TLE を入力..."></textarea>
        <label>
          接近閾値 (km)
          <input id="threshold-km" type="number" min="1" max="500" step="0.5" value="50" />
        </label>
        <label>
          位置不確かさ σ (km, 任意)
          <input id="sigma-km" type="number" min="0.1" max="10" step="0.1" placeholder="自動推定" />
        </label>
        <label class="checkbox-row">
          <input id="use-advanced-pc" type="checkbox" />
          高精度 Pc (Alfriend encounter plane)
        </label>
        <div class="button-row">
          <button id="btn-load-sample" type="button">ISS サンプル</button>
          <button id="btn-load-demo" type="button">デモ TLE 読込</button>
          <button id="btn-scan" type="button" class="primary">接近解析</button>
        </div>
        <p id="status-msg" class="status-msg" aria-live="polite"></p>
      </section>

      <section id="panel-constellation" class="mode-panel hidden">
        <h2>コンステレーション TLE</h2>
        <p class="meta">複数 TLE を <code>---</code> で区切って入力（最大25衛星）</p>
        <textarea id="constellation-input" rows="10" placeholder="SAT-1 TLE&#10;---&#10;SAT-2 TLE"></textarea>
        <label>
          接近閾値 (km)
          <input id="batch-threshold-km" type="number" min="1" max="500" step="0.5" value="50" />
        </label>
        <label class="checkbox-row">
          <input id="batch-use-advanced-pc" type="checkbox" />
          高精度 Pc (Alfriend encounter plane)
        </label>
        <div class="button-row">
          <button id="btn-load-constellation-demo" type="button">デモ読込</button>
          <button id="btn-batch-scan" type="button" class="primary">一括解析</button>
        </div>
        <p id="batch-status-msg" class="status-msg" aria-live="polite"></p>
        <label id="satellite-select-wrap" class="hidden">
          衛星選択
          <select id="satellite-select"></select>
        </label>
        <p id="batch-summary" class="meta"></p>
      </section>

      <section id="panel-cdm" class="mode-panel hidden">
        <h2>CDM テキスト</h2>
        <textarea id="cdm-input" rows="8" placeholder="CCSDS CDM key=value 形式..."></textarea>
        <h2>比較用 TLE</h2>
        <label>衛星 TLE</label>
        <textarea id="cdm-sat-tle" rows="4"></textarea>
        <label>デブリ TLE</label>
        <textarea id="cdm-deb-tle" rows="4"></textarea>
        <div class="button-row">
          <button id="btn-load-cdm-demo" type="button">デモ CDM 読込</button>
          <button id="btn-cdm-compare" type="button" class="primary">比較実行</button>
        </div>
        <p id="cdm-status-msg" class="status-msg" aria-live="polite"></p>
        <div id="cdm-result" class="cdm-result hidden"></div>
      </section>

      <section id="panel-alerts" class="mode-panel hidden">
        <h2>Space-Track CDM アラート</h2>
        <p class="meta">Space-Track 認証（.env）が必要です。</p>
        <label>
          監視衛星 NORAD ID
          <input id="alert-norad-id" type="number" min="1" value="25544" />
        </label>
        <label>
          Pc 下限
          <input id="alert-pc-min" type="number" min="0" step="any" value="0.00001" />
        </label>
        <label>衛星 TLE（比較用）</label>
        <textarea id="alert-sat-tle" rows="4" placeholder="単一衛星 TLE または ISS サンプル"></textarea>
        <div class="button-row">
          <button id="btn-alert-load-iss" type="button">ISS サンプル</button>
          <button id="btn-fetch-alerts" type="button" class="primary">Space-Track 取得</button>
        </div>
        <p id="alert-status-msg" class="status-msg" aria-live="polite"></p>
        <table id="alert-table" class="alert-table hidden">
          <thead>
            <tr>
              <th>TCA</th>
              <th>Pc</th>
              <th>Miss (km)</th>
              <th>相手</th>
              <th>緊急</th>
            </tr>
          </thead>
          <tbody id="alert-table-body"></tbody>
        </table>
        <div id="alert-compare-result" class="cdm-result hidden"></div>
      </section>

      <section>
        <h2>接近イベント</h2>
        <p id="scan-meta" class="meta"></p>
        <ul id="conjunction-list" class="conjunction-list"></ul>
      </section>

      <section id="maneuver-section" class="hidden">
        <h2>回避マニューバ試算</h2>
        <p id="selected-debris" class="meta"></p>
        <label>
          方向
          <select id="maneuver-direction">
            <option value="prograde">prograde（順行）</option>
            <option value="retrograde">retrograde（逆行）</option>
            <option value="normal">normal（法線）</option>
          </select>
        </label>
        <label>
          Δv (m/s)
          <input id="delta-v" type="number" min="0.01" max="1.0" step="0.01" value="0.1" />
        </label>
        <button id="btn-maneuver" type="button">試算実行</button>
        <div id="maneuver-result" class="maneuver-result"></div>
      </section>
    </aside>

    <section class="panel viewer-panel">
      <div id="cesiumContainer"></div>
    </section>
  </main>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
  <script type="module" src="js/cesium_viewer.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
