# Fly.io — rename app via: fly apps create <your-app-name> && fly launch
app = "cas-demo"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  BATCH_MAX_WORKERS = "2"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "40s"
    method = "GET"
    path = "/health"

[mounts]
  source = "cas_cache"
  destination = "/app/data/cache"
