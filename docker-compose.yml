services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cas
      POSTGRES_PASSWORD: cas
      POSTGRES_DB: cas
    volumes:
      - cas-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cas -d cas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  cas:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CAS_HOST: "0.0.0.0"
      CAS_PORT: "8000"
      DATABASE_URL: postgresql://cas:cas@postgres:5432/cas
      REDIS_URL: redis://redis:6379/0
    volumes:
      - cas-cache:/app/data/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build: .
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    deploy:
      replicas: 1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cas:cas@postgres:5432/cas
      REDIS_URL: redis://redis:6379/0
    volumes:
      - cas-cache:/app/data/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A backend.app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cas:cas@postgres:5432/cas
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  cas-cache:
  cas-pg:
