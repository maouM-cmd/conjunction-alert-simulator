services:
  cas:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CAS_HOST: "0.0.0.0"
      CAS_PORT: "8000"
    volumes:
      - cas-cache:/app/data/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cas-cache:
