name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  CAS_DEPLOY_URL: https://conjunction-alert-simulator.onrender.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      hook_triggered: ${{ steps.hook.outputs.triggered }}
    steps:
      - name: Trigger Render deploy hook
        id: hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy hook"
            echo "triggered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "triggered=true" >> "$GITHUB_OUTPUT"

  verify:
    needs: [test, deploy]
    if: ${{ always() && needs.test.result == 'success' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Render build
        env:
          HOOK_TRIGGERED: ${{ needs.deploy.outputs.hook_triggered }}
        run: |
          if [ "$HOOK_TRIGGERED" = "true" ]; then
            echo "Deploy hook triggered — waiting 180s for build"
            sleep 180
          else
            echo "No deploy hook — waiting 30s for auto-deploy settle"
            sleep 30
          fi

      - name: Verify live deployment
        run: |
          for i in $(seq 1 8); do
            echo "verify attempt $i/8..."
            if python -m backend.cli.verify_deploy --url "$CAS_DEPLOY_URL" --timeout 120; then
              exit 0
            fi
            sleep 60
          done
          echo "verify_deploy failed after 8 attempts"
          exit 1
